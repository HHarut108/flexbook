# Render Blueprint — declarative deploy for services in this repo.
# Docs: https://render.com/docs/blueprint-spec
#
# Connect this repo as a Blueprint in Render and the visa-service comes
# up automatically on every push to main. After the first deploy:
#   1. Note the public URL Render assigns (e.g. https://flexbook-visa.onrender.com).
#   2. Set REFRESH_TOKEN to a random secret via the Render dashboard
#      (marked sync: false below, so it's never committed).
#   3. On the Vercel backend, set VISA_SERVICE_URL to that public URL.
#
# Plan note: the free Render plan spins the service down after 15min of
# inactivity (cold-start ~30s). For real user traffic, upgrade to a paid
# instance via the dashboard — no YAML change needed.

services:
  # ── Production visa-service (tracks main) ─────────────────────────────────
  - type: web
    name: flexbook-visa-service
    runtime: node
    rootDir: services/visa-service
    plan: free
    region: oregon
    branch: main
    # No tsc step: the service runs TypeScript directly via tsx. We were
    # hitting a TS deprecation diagnostic on Render that couldn't be
    # reproduced or pinned away locally — likely workspace-root hoisting
    # winning over services/visa-service/node_modules. Skipping the compile
    # step entirely sidesteps the whole class of issues. tsx is now a
    # production dependency.
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected by Render at runtime; the service reads it via env.
      # Do NOT set PORT here — overriding it will break the health check.
      - key: ALLOWED_ORIGIN
        # The Flexbook backend is the only legitimate caller. CORS isn't a
        # security boundary here (the proxy hides the service URL from the
        # browser), but restricting it costs nothing.
        value: https://flexbook-frontend.vercel.app
      - key: AUTO_REFRESH
        value: "true"
      - key: REFRESH_TOKEN
        # Set via dashboard, not committed. Required in production — the
        # /refresh endpoint returns 503 if unset.
        sync: false

  # ── Staging visa-service (tracks staging) ─────────────────────────────────
  # Mirror of the production service that auto-deploys from the `staging`
  # branch, so staging.flexbook.space can exercise new visa-service routes
  # before they promote to main. Without this, the staging backend was
  # forced to call the prod visa-service and any new route added on staging
  # would 404 there until staging→main lands (this is exactly what bit us
  # while shipping the Visa-free escape optimizer — backend had the new
  # /visa-free proxy route ready, prod visa-service didn't).
  #
  # After this service comes up:
  #   1. Note its public URL from the Render dashboard.
  #   2. Set VISA_SERVICE_URL on the `flexbook-backend-staging` service to
  #      that URL (Render → backend-staging → Environment). The prod
  #      backend keeps pointing at flexbook-visa-service.
  #   3. Generate a fresh REFRESH_TOKEN for this service in the dashboard.
  - type: web
    name: flexbook-visa-service-staging
    runtime: node
    rootDir: services/visa-service
    plan: free
    region: oregon
    branch: staging
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        # Staging is gated by Vercel auth — only the staging backend hits
        # this service, but list explicitly anyway.
        value: https://staging.flexbook.space,https://flexbook-backend-staging.onrender.com
      - key: AUTO_REFRESH
        value: "true"
      - key: REFRESH_TOKEN
        sync: false
