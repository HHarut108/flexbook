<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Your trip. Your rules. Your price. FlexBook finds the cheapest multi-stop flights from anywhere — no account needed." />
    <title>FlexBook</title>
    <meta name="theme-color" content="#3730A3" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FlexBook — Plan your multi-stop trip" />
    <meta property="og:description" content="Your trip. Your rules. Your price. FlexBook finds the cheapest multi-stop flights from anywhere — no account needed." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FlexBook — Plan your multi-stop trip" />
    <meta name="twitter:description" content="Find the cheapest multi-stop flights. No sign-up required." />
    <meta name="twitter:image" content="/icons/icon-512.png" />
    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FlexBook" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    <!-- Fonts: preconnect to Google Fonts so the CSS + woff2 round-trips start
         immediately, before the main bundle parses. `display=swap` keeps text
         visible in the fallback (system sans) during the woff2 download,
         eliminating the FOIT flash. JetBrains Mono is trimmed to 400/700
         (the only mono weights actually used — body text + bold prices),
         and Inter drops the opsz axis to ship a smaller variable file. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <!-- Preconnect to API origins so the first /api request doesn't pay
         DNS+TLS handshake on top of the cold-start ping in App.tsx. Origins
         are the public Render/Vercel domains; the dev proxy is unaffected. -->
    <link rel="preconnect" href="https://api.flexbook.space" crossorigin />
    <link rel="dns-prefetch" href="https://api.flexbook.space" />
    <link rel="preconnect" href="https://staging-api.flexbook.space" crossorigin />
    <link rel="dns-prefetch" href="https://staging-api.flexbook.space" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
